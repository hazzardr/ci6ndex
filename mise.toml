[tools]
node = "latest"

[env]
PROJECT_NAME = "ci6ndex"
EXEC_NAME = "civ"
SSH_USER = "ansible"
DEPLOY_TARGET_IP = "192.168.86.10"

[tasks.help]
description = "List available tasks"
run = "mise tasks"

[tasks.update]
description = "Update Go dependencies"
run = "go get -u && go mod tidy"

[tasks.doctor]
description = "Check local development environment"
run = """
if ! command -v go &> /dev/null; then
  echo "`go` is not installed. Please install it first."
  exit 1
fi

if [[ ! ":$PATH:" == *":$HOME/go/bin:"* ]]; then
  echo "GOPATH/bin is not in PATH. Please add it to your PATH variable."
  exit 1
fi

if ! command -v sqlc &> /dev/null; then
  echo "`sqlc` is not installed. Please install it."
  exit 1
fi

if ! command -v docker &> /dev/null; then
  echo "`docker` is not installed. Please install it first."
  exit 1
fi

echo "Local environment OK"
"""

[tasks.build]
description = "Generate DB code and build binary to ./bin/civ"
depends = ["generate"]
run = "go build -o ./bin/$EXEC_NAME ."

[tasks.lint]
description = "Lint the project"
run = "golangci-lint run ./..."

[tasks.docker]
description = "Build Docker image ci6ndex:latest"
run = "docker build -t $PROJECT_NAME:latest ."

[tasks.clean]
description = "Delete generated code and binaries"
run = "rm -rf ci6ndex/generated/ bin/"

[tasks.generate]
description = "Generate database code"
run = "sqlc generate -f sqlc.yaml"

[tasks.run]
description = "Build, then run civ bot serve with .env.dev loaded"
depends = ["build"]
run = "export $(cat .env.dev | xargs) && ./bin/$EXEC_NAME bot serve"

[tasks.sync]
description = "Build, then run civ bot sync with .env loaded"
depends = ["build"]
run = "export $(cat .env | xargs) && ./bin/$EXEC_NAME bot sync"

[tasks."prod/connect"]
description = "Open SSH session on deploy target"
run = "ssh $SSH_USER@$DEPLOY_TARGET_IP"

[tasks."prod/env"]
description = "Deploy env file to remote host"
run = "rsync -P .env $SSH_USER@$DEPLOY_TARGET_IP:~/docker/$PROJECT_NAME/.env && ssh $SSH_USER@$DEPLOY_TARGET_IP 'chmod 600 ~/docker/$PROJECT_NAME/.env'"

[tasks."prod/deploy"]
description = "Deploy docker-compose.yaml to remote host"
run = "rsync -P docker-compose.yaml $SSH_USER@$DEPLOY_TARGET_IP:~/docker/$PROJECT_NAME/docker-compose.yaml && ssh $SSH_USER@$DEPLOY_TARGET_IP 'chmod 600 ~/docker/$PROJECT_NAME/docker-compose.yaml'"

[tasks."prod/logs"]
description = "View logs from the deployed container"
run = "ssh $SSH_USER@$DEPLOY_TARGET_IP 'cd ~/docker/$PROJECT_NAME && sudo docker compose logs -f'"
